}</script></div><div><p>土曜日の夜、旦那（だんな）とカラオケに行きました。</p><p>カラオケで日本語のうたと英語のうたを歌いました。</p><p>カラオケは家から近いです、10分（じっぷん）くらいで行けます。二人 (ふたり）はそこまで歩いて行きました。</p><p>そのカラオケはとても安いです。</p><p>それに飲み物とか食べ物とかは自由に持って行けます。</p><p>お酒も持って行けます。</p><p>カラオケのとなりにコンビニがありますので、まず、そこで買い物してからカラオケに行きました。</p></div></post></div></body></html>
